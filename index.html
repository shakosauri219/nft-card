<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>nft card</title>
  </head>
  <body>
    <div class="card">
        <img class="equilibrium" src="image-equilibrium.jpg">
        <h1>Equilibrium #3429</h1>
        <p>Our Equilibrium collection promotes balance and calm.</p>
        <div class="pricediv">
            <img class="icon" src="/icon-ethereum.svg">
            <label class="price">0.041 ETH</label>
            <img class="clock" src="/icon-clock.svg">
            <label class="days">3 days left</label>
        </div>
        <div class="line"></div>
        <img class="avatar" src="image-avatar.png">
        <label class="creation">Creation of</label>
        <label class="name">Jules Wyvern</label>
    </div>
  </body>
</html>
